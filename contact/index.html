<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>お問い合わせ｜Vocabnote</title>
  <meta name="description" content="Vocabnote のお問い合わせフォーム。ご意見・ご要望・不具合報告はこちらからお願いします。" />
  <meta name="theme-color" content="#000000" />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://holidayygit.github.io/vocabnote/contact/" />
  <link rel="icon" type="image/png" href="../assets/images/logo.png" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <nav class="nav" aria-label="メインナビゲーション">
        <a href="../" class="nav-brand">
          <img src="../assets/images/logo.png" alt="Vocabnote ロゴ" />
          <span>Vocabnote</span>
        </a>
        <ul class="nav-links">
          <li class="hide-mobile"><a href="../">ホーム</a></li>
          <li><a href="../privacy/">プライバシーポリシー</a></li>
          <li><a href="../en/contact/" class="nav-lang">EN</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <article class="doc-page">
      <h1>お問い合わせ</h1>
      <p class="doc-meta">ご意見・ご要望・不具合報告など、お気軽にお寄せください。</p>

      <p>
        以下のフォームよりお問い合わせください。<br />
        いただいた内容を確認の上、必要に応じてご連絡いたします。
      </p>

      <div class="form-wrap">
        <iframe
          src="https://docs.google.com/forms/d/e/1FAIpQLSfXV7BoGySETP5Alal8fyuVs88GdmZIhcQbtYYOckojGbQqWQ/viewform?embedded=true"
          title="お問い合わせフォーム"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        >
          読み込んでいます…
        </iframe>
      </div>

      <p class="contact-note">
        フォームが表示されない場合は、
        <a
          href="https://docs.google.com/forms/d/e/1FAIpQLSfXV7BoGySETP5Alal8fyuVs88GdmZIhcQbtYYOckojGbQqWQ/viewform"
          target="_blank"
          rel="noopener"
        >こちら</a>から直接ご記入いただけます。
      </p>
    </article>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-content">
        <a href="../" class="footer-brand">
          <img src="../assets/images/logo.png" alt="" />

        <ul class="footer-links">
          <li><a href="../privacy/">プライバシーポリシー</a></li>
          <li><a href="../contact/">お問い合わせ</a></li>

    </div>
